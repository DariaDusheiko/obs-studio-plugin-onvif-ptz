name: Build OBS Plugin

on:
  push:
    branches: [main, master]
    paths:
      - 'plugin/**'
  pull_request:
    paths:
      - 'plugin/**'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libobs-dev libcurl4-openssl-dev

      - name: Configure
        working-directory: plugin
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: plugin
        run: cmake --build build --config Release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-plugin-linux
          path: plugin/build/my-plugin.so

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: compsciutor/setup-msvc@v1
        with:
          arch: x64

      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Install dependencies via vcpkg
        run: |
          C:/vcpkg/vcpkg install libcurl:x64-windows libobs:x64-windows

      - name: Configure with CMake
        working-directory: plugin
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        working-directory: plugin
        run: cmake --build build --config Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-plugin-windows
          path: plugin/build/Release/my-plugin.dll
