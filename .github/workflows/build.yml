name: Multi-Platform Build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libobs-dev libcurl4-openssl-dev
      - name: Build
        run: |
          cd plugin
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-linux
          path: plugin/build/my-plugin.so

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install vcpkg deps
        # Мы ставим curl и obs-studio через vcpkg для Windows
        run: vcpkg install curl:x64-windows obs-studio:x64-windows --binarycaching
      - name: Build
        run: |
          cd plugin
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: plugin/build/Release/my-plugin.dll

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Deps
        run: brew install cmake obs curl
      - name: Build
        run: |
          cd plugin
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-macos
          path: plugin/build/my-plugin.so